<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Arusuvai Junction product card concept</title>
  <desc>A product card concept for a traditional healthy foods ecommerce platform with product image, wishlist, share, rating, reviews, price, description, add to cart and buy now actions.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EC"/>
      <stop offset="0.55" stop-color="#F7F0D9"/>
      <stop offset="1" stop-color="#EAF4E5"/>
    </linearGradient>
    <linearGradient id="media" x1="0" y1="118" x2="0" y2="455" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDF6DF"/>
      <stop offset="1" stop-color="#F4E3BF"/>
    </linearGradient>
    <filter id="cardShadow" x="348" y="70" width="504" height="788" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#3C3214" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#3C3214" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="0" y="0" width="1200" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#page)"/>
  <g opacity="0.5" filter="url(#soft)">
    <path d="M0 775C158 713 274 804 424 742C565 684 617 567 760 550C925 531 1026 657 1200 591V900H0V775Z" fill="#DDECCF"/>
    <path d="M0 143C143 103 261 139 391 96C551 44 640 7 809 42C960 73 1062 114 1200 76V0H0V143Z" fill="#F7E4B9"/>
  </g>

  <text x="600" y="55" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800" fill="#2A2F1A">Product Card UI Concept</text>
  <text x="600" y="84" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="600" fill="#5A513F">Traditional healthy foods ecommerce card for Arusuvai Junction</text>

  <g filter="url(#cardShadow)">
    <rect x="395" y="105" width="410" height="680" rx="24" fill="#FFFFFF"/>
    <rect x="395.5" y="105.5" width="409" height="679" rx="23.5" stroke="#D7CDAE"/>

    <clipPath id="cardClip"><rect x="395" y="105" width="410" height="680" rx="24"/></clipPath>
    <g clip-path="url(#cardClip)">
      <rect x="395" y="105" width="410" height="315" fill="url(#media)"/>
      <path d="M411 379C500 328 570 371 641 331C711 292 748 216 812 223V420H411V379Z" fill="#E8D096" opacity="0.45"/>
      <path d="M395 376C470 323 535 350 604 317C673 283 712 226 805 248V420H395V376Z" fill="#DDECCF" opacity="0.72"/>

      <rect x="476" y="129" width="94" height="32" rx="16" fill="#F6CF59"/>
      <text x="523" y="150" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="800" fill="#3D371F">Healthy</text>

      <circle cx="752" cy="145" r="22" fill="white" fill-opacity="0.94"/>
      <path d="M745 148L758 139M745 142L758 151" stroke="#4F6A32" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="743" cy="145" r="3.4" fill="#4F6A32"/>
      <circle cx="761" cy="137" r="3.4" fill="#4F6A32"/>
      <circle cx="761" cy="153" r="3.4" fill="#4F6A32"/>

      <circle cx="448" cy="145" r="22" fill="white" fill-opacity="0.94"/>
      <path d="M448 156C448 156 436 149 436 140C436 135 439 132 444 132C447 132 449 134 448 136C450 134 452 132 456 132C461 132 464 135 464 140C464 149 448 156 448 156Z" fill="#B42318"/>

      <ellipse cx="600" cy="343" rx="135" ry="34" fill="#B99356" opacity="0.24"/>
      <ellipse cx="600" cy="323" rx="129" ry="44" fill="#CFA76A"/>
      <ellipse cx="600" cy="311" rx="118" ry="39" fill="#F5E7C6"/>
      <ellipse cx="600" cy="314" rx="103" ry="28" fill="#E6C58A"/>

      <g transform="translate(506 188)">
        <circle cx="49" cy="88" r="34" fill="#C77B31"/>
        <circle cx="45" cy="79" r="4" fill="#F7D47B"/>
        <circle cx="61" cy="91" r="3.6" fill="#F7D47B"/>
        <circle cx="39" cy="98" r="3.2" fill="#F7D47B"/>
        <path d="M22 87C33 69 59 66 74 81" stroke="#8C4A1F" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

        <circle cx="110" cy="93" r="31" fill="#D99038"/>
        <circle cx="100" cy="84" r="3.4" fill="#F9DB87"/>
        <circle cx="119" cy="96" r="3.6" fill="#F9DB87"/>
        <circle cx="108" cy="105" r="3" fill="#F9DB87"/>

        <path d="M86 139C107 116 149 120 161 147C171 170 142 190 112 179C86 169 68 158 86 139Z" fill="#B96B25"/>
        <path d="M102 145C117 133 143 137 149 151C154 165 135 176 115 169C99 163 90 155 102 145Z" fill="#F0B95D" opacity="0.55"/>

        <circle cx="75" cy="145" r="26" fill="#E0A344"/>
        <circle cx="68" cy="138" r="3" fill="#F9DB87"/>
        <circle cx="82" cy="148" r="3" fill="#F9DB87"/>
        <circle cx="73" cy="156" r="2.6" fill="#F9DB87"/>
      </g>

      <rect x="395" y="420" width="410" height="365" fill="#FFFFFF"/>

      <g transform="translate(425 444)">
        <rect x="0" y="0" width="99" height="26" rx="13" fill="#EEF7E9"/>
        <text x="49.5" y="18" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#4F6A32">Best seller</text>
        <rect x="109" y="0" width="78" height="26" rx="13" fill="#FFF3C8"/>
        <text x="148" y="18" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="800" fill="#7A4A08">No sugar</text>
      </g>

      <text x="425" y="510" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="800" fill="#2A2F1A">Millet Seed Laddu</text>
      <text x="425" y="539" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="600" fill="#5A513F">Palm jaggery, nuts, seeds and millets.</text>
      <text x="425" y="563" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="600" fill="#5A513F">Small-batch sweetness with traditional flavour.</text>

      <g transform="translate(425 591)">
        <text x="0" y="0" dominant-baseline="middle" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" fill="#F2B827">*****</text>
        <text x="102" y="0" dominant-baseline="middle" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" fill="#2A2F1A">4.8</text>
        <text x="132" y="0" dominant-baseline="middle" font-family="Manrope, Arial, sans-serif" font-size="13" font-weight="600" fill="#5A513F">(142 reviews)</text>
      </g>

      <g transform="translate(425 623)">
        <text x="0" y="21" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="900" fill="#2A2F1A">Rs. 249</text>
        <text x="111" y="21" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#8C846F" text-decoration="line-through">Rs. 299</text>
        <rect x="174" y="1" width="66" height="26" rx="13" fill="#FCE8D5"/>
        <text x="207" y="18" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="12" font-weight="900" fill="#A14210">17% off</text>
      </g>

      <g transform="translate(425 674)">
        <rect x="0" y="0" width="166" height="56" rx="18" fill="#4F6A32"/>
        <path d="M35 23h7l4 16h36l4-20H50" stroke="#FFFFFF" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="54" cy="44" r="3" fill="#FFFFFF"/>
        <circle cx="76" cy="44" r="3" fill="#FFFFFF"/>
        <text x="113" y="35" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF">Add cart</text>

        <rect x="182" y="0" width="151" height="56" rx="18" fill="#F2B827"/>
        <text x="257.5" y="35" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="900" fill="#2A2F1A">Buy now</text>
      </g>
    </g>
  </g>

  <g transform="translate(80 624)">
    <text x="0" y="0" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="800" fill="#2A2F1A">Design notes</text>
    <text x="0" y="42" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">- Heart left, share right</text>
    <text x="0" y="72" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">- Rating + reviews above price</text>
    <text x="0" y="102" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">- Add cart and Buy now</text>
    <text x="0" y="132" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">- Warm healthy-food palette</text>
  </g>

  <g transform="translate(858 248)">
    <rect x="0" y="0" width="230" height="288" rx="24" fill="#FFFFFF" fill-opacity="0.75" stroke="#D7CDAE"/>
    <text x="26" y="48" font-family="Fraunces, Georgia, serif" font-size="27" font-weight="800" fill="#2A2F1A">Mobile ready</text>
    <text x="26" y="89" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">The card uses large touch</text>
    <text x="26" y="114" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">targets, separated icons,</text>
    <text x="26" y="139" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">and compact copy so it</text>
    <text x="26" y="164" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">does not overflow on</text>
    <text x="26" y="189" font-family="Manrope, Arial, sans-serif" font-size="15" font-weight="700" fill="#5A513F">small product grids.</text>
    <rect x="26" y="220" width="178" height="42" rx="21" fill="#4F6A32"/>
    <text x="115" y="247" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">Use as reference</text>
  </g>
</svg>

# Vite SPA + reverse proxy to the backend container.
# `backend` is the service name from docker-compose.yml and resolves
# via Docker's internal DNS. Override BACKEND_ORIGIN via env if you
# want to point at a different host (e.g. when running this image
# standalone behind a load balancer).
upstream backend_upstream {
    server backend:8080;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # API + auth — forward to the Java backend.
    location /arusuvai/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every other path serves index.html so React Router
    # can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

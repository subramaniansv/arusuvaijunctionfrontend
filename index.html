<!doctype html>
<html lang="en-IN">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TD8BZ8F8E9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TD8BZ8F8E9');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#a85a1a" />

    <!-- Default metadata. Each route overrides these via <Seo />. -->
    <title>Arusuvai Junction — Traditional Indian snacks, sugar-free with nuts & seeds</title>
    <meta
      name="description"
      content="Arusuvai Junction makes traditional and modern Indian snacks crafted with nuts, seeds, millets and natural sweeteners. Sugar-free, protein-rich, preservative-free — flavours of home, made the healthy way."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://www.arusuvaijunction.com/" />

    <!-- Open Graph defaults -->
    <meta property="og:site_name" content="Arusuvai Junction" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Arusuvai Junction — Traditional Indian snacks, sugar-free with nuts & seeds" />
    <meta property="og:description" content="Sugar-free, protein-rich, preservative-free traditional & modern Indian snacks." />
    <meta property="og:url" content="https://www.arusuvaijunction.com/" />
    <meta property="og:image" content="https://www.arusuvaijunction.com/og-default.jpg" />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Icons + manifest -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts: preconnect first (saves ~100-300ms vs cold DNS+TLS),
         then load the stylesheet non-blocking via the media=print +
         onload swap trick. Browser fetches it at low priority, then
         promotes to all media once ready — first paint is no longer
         held up by Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Performance: pre-connect + DNS-prefetch to the Razorpay
         checkout origin. The actual SDK script is now injected by
         the React app only when the user reaches checkout, so the
         home page no longer pays the ~30 KB request on first load. -->
    <link rel="preconnect" href="https://checkout.razorpay.com" crossorigin />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />

    <!-- Preconnect to backend API so the first /products fetch from
         the SPA does not pay DNS + TLS round-trip latency. -->
    <link rel="preconnect" href="https://arusuvaijunctionbackend.onrender.com" crossorigin />

    <!-- Preload the hero background as WebP so the LCP image starts
         downloading in parallel with the JS bundle. WebP is 65% smaller
         than the JPEG fallback, with ~98% browser support. -->
    <link
      rel="preload"
      as="image"
      href="/hero.webp"
      type="image/webp"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Arusuvai Junction — traditional Indian sugar-free snacks. Please enable JavaScript to shop.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
